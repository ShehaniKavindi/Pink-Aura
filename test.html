<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — PiNK AURA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="test.css">
</head>
<body>

<div class="login-page">
  <img class="login-bg" src="assets/images/site-images/loginBg.jpg" alt="">
  <div class="login-bg-overlay"></div>

  <a class="login-logo" href="index.html">PiNK <span>AURA</span></a>

  <div class="login-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Sign in to your account</h1>
    <p class="login-sub">Glow starts here — access your orders, wishlist, and saved details.</p>

    <form class="login-form" id="loginForm">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" name="password" placeholder="••••••••" required>
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password" aria-pressed="false">
            <!-- open eye -->
            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- closed eye -->
            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3l18 18"/>
              <path d="M10.6 10.6a2 2 0 0 0 2.83 2.83"/>
              <path d="M6.5 6.7C4 8.3 1.5 12 1.5 12s3.5 7 10.5 7c1.9 0 3.5-.5 4.9-1.2"/>
              <path d="M17.6 17.6C20.3 15.9 22.5 12 22.5 12s-.9-1.8-2.6-3.6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-row">
        <label class="checkbox">
          <input type="checkbox" name="remember">
          Remember me
        </label>
        <a href="#" class="link">Forgot password?</a>
      </div>

      <button type="submit" class="btn login-submit">Sign in &rarr;</button>
    </form>

    <div class="login-divider"><span>or</span></div>

    <button type="button" class="btn outline login-alt">
      <span class="g-icon">G</span> Continue with Google
    </button>

    <p class="login-footer-text">New to PiNK AURA? <a href="#">Create an account</a></p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    // TODO: wire up to process/login.php
    console.log('Login submitted:', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      remember: document.querySelector('input[name="remember"]').checked
    });
  });

  // Show/hide password
  const passwordInput = document.getElementById('password');
  const passwordToggle = document.getElementById('passwordToggle');
  passwordToggle.addEventListener('click', () => {
    const isVisible = passwordInput.type === 'text';
    passwordInput.type = isVisible ? 'password' : 'text';
    passwordToggle.classList.toggle('is-visible', !isVisible);
    passwordToggle.setAttribute('aria-pressed', String(!isVisible));
    passwordToggle.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
  });
</script>

</body>
</html>
